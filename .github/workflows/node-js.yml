# Node.js CI/CD workflow for inSmartio marketing site
name: Node.js CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - run: npm run build --if-present

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "|1|EH16F3ayro72Hh4UsgjbGCDGQZE=|EKeMD2XnRkTGyCeqhevSP4yD/2M= ssh-rsa " >> ~/.ssh/known_hosts
          echo "|1|Yu50JAVBFImz7kSEDc0QHvYkO4Y=|NQRxlC+EtWP5j7P9WJ6kvrom7uM= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBAGabSU/WirR/YildWH0mwoBDMMiUN39rDua0uj8tUjzsBYvtF83WX6aM8u4HDZLeRu86AghcGJDTlUYM7PsiJY=" >> ~/.ssh/known_hosts
          echo "|1|vR4O0l4Co4ybXy+4VNlaplVL01o=|HDsaLfgTdEtJMEosb0vsA7ZcpDE= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMaHH6FfChUY9nk98K21AOBO0juIDsfLVcuy9PIIIB+Q" >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh -i ~/.ssh/id_ed25519 root@62.72.32.105 << 'EOF'
            cd /var/www/insmartio
            git pull origin main
            npm ci
            npm run build
            pm2 restart insmartio
          EOF